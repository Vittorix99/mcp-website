# kind|scope|config|relative_path|secret_name
# kind:
# - env_source: importa ogni KEY=VALUE del file come secret Doppler separato.
# - env_target: file locale ricreato dal pull per sviluppo/bootstrap.
# - json_file: importa il contenuto JSON grezzo dentro secret_name, senza base64.
#
# scope:
# - backend
# - frontend
#
# config:
# - dev
# - prod
#
# Nota: .env.local non e incluso per scelta. Deve essere un override locale temporaneo,
# non una fonte di verita condivisa.
env_source|backend|dev|mcp-backend/functions/.env.integration|
env_target|backend|dev|mcp-backend/functions/.env.integration|
env_source|backend|prod|mcp-backend/functions/.env|
env_target|backend|prod|mcp-backend/functions/.env|
json_file|backend|dev|mcp-backend/functions/service_account_test.json|FIREBASE_SERVICE_ACCOUNT_JSON
json_file|backend|prod|mcp-backend/functions/service_account.json|FIREBASE_SERVICE_ACCOUNT_JSON
json_file|backend|dev|mcp-backend/functions/service_account_gmail_test.json|GMAIL_SERVICE_ACCOUNT_JSON
json_file|backend|prod|mcp-backend/functions/service_account_gmail_prod.json|GMAIL_SERVICE_ACCOUNT_JSON
env_source|frontend|dev|mcp-website/.env|
env_source|frontend|dev|mcp-website/.env.development|
env_target|frontend|dev|mcp-website/.env.development|
env_source|frontend|prod|mcp-website/.env|
env_source|frontend|prod|mcp-website/.env.production|
env_target|frontend|prod|mcp-website/.env.production|
