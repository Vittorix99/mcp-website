[pytest]
addopts = --import-mode=importlib
pythonpath = .
testpaths =
    tests/unit
    tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: integration tests that hit real services
    email: tests that send real emails
filterwarnings =
    ignore::FutureWarning:google.api_core
    ignore::DeprecationWarning:importlib
