<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua tessera associativa</title>
</head>
<body style="margin: 0; padding: 20px; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center">
                
                <table width="500" cellpadding="0" cellspacing="0" border="0" style="background: linear-gradient(135deg, #FF4500 0%, #800000 50%, #1A001A 100%); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                    
                    <tr>
                        <td align="left" style="padding: 30px;">
                            <img src="https://via.placeholder.com/150x50/ffffff/000000?text=Music+Connecting+People" alt="Music Connecting People ETS" width="150" style="display: block; border: none; font-weight: bold; color: white;">
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 20px;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: bold;">{{NomeUtente}}</h1>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 10px 20px;">
                            <p style="color: #ffffff; margin: 5px 0; font-size: 16px; font-weight: bold;">Membership ID: {{MembershipID}}</p>
                            <p style="color: #ffffff; margin: 5px 0; font-size: 16px;">Valida fino al: <strong>31-12-2026</strong></p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 20px;">
                            <div style="background-color: #ffffff; padding: 10px; display: inline-block; border-radius: 10px;">
                                <img src="https://quickchart.io/qr?text={{MembershipID}}&size=120" alt="Il tuo QR Code" width="120" height="120" style="display: block; border: none;">
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 20px;">
                            <p style="color: #cccccc; margin: 0; font-size: 12px; font-style: italic;">* Music Connecting People ETS – Anno 2026 *</p>
                        </td>
                    </tr>

                </table>
                </td>
        </tr>
    </table>

</body>
</html>
