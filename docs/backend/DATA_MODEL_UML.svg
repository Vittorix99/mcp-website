<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1450" viewBox="0 0 2200 1450">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .title { fill: #f4f4f5; font: 700 42px Arial, sans-serif; }
      .subtitle { fill: #a1a1aa; font: 24px Arial, sans-serif; }
      .box { fill: #18181b; stroke: #52525b; stroke-width: 2; rx: 18; }
      .core { stroke: #f97316; }
      .support { stroke: #38bdf8; }
      .config { stroke: #a3e635; }
      .name { fill: #f4f4f5; font: 700 26px Arial, sans-serif; }
      .field { fill: #d4d4d8; font: 20px Arial, sans-serif; }
      .path { fill: #a1a1aa; font: 18px Arial, sans-serif; }
      .edge { stroke: #71717a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edgeLabel { fill: #fafafa; font: 18px Arial, sans-serif; }
      .legend { fill: #d4d4d8; font: 22px Arial, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#71717a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1450"/>
  <text class="title" x="80" y="80">MCP Backend Data Model UML</text>
  <text class="subtitle" x="80" y="120">Relazioni applicative Firestore tramite ID e subcollection, non foreign key enforceate.</text>

  <rect class="box core" x="80" y="190" width="430" height="300"/>
  <text class="name" x="110" y="235">Event</text>
  <text class="path" x="110" y="265">events/{eventId}</text>
  <text class="field" x="110" y="305">id, title, slug</text>
  <text class="field" x="110" y="335">date, start_time, end_time</text>
  <text class="field" x="110" y="365">status, purchase_mode</text>
  <text class="field" x="110" y="395">price, fee, max_participants</text>
  <text class="field" x="110" y="425">participants_count</text>
  <text class="field" x="110" y="455">created_by, updated_by</text>

  <rect class="box core" x="880" y="190" width="500" height="350"/>
  <text class="name" x="910" y="235">EventParticipant</text>
  <text class="path" x="910" y="265">participants/{eventId}/participants_event/{participantId}</text>
  <text class="field" x="910" y="305">id, event_id</text>
  <text class="field" x="910" y="335">name, surname, email, phone</text>
  <text class="field" x="910" y="365">membership_id, membership_included</text>
  <text class="field" x="910" y="395">entered, entered_at</text>
  <text class="field" x="910" y="425">ticket_pdf_url, ticket_sent</text>
  <text class="field" x="910" y="455">payment_method, purchase_id</text>
  <text class="field" x="910" y="485">newsletter_consent</text>

  <rect class="box core" x="80" y="730" width="500" height="360"/>
  <text class="name" x="110" y="775">Membership</text>
  <text class="path" x="110" y="805">memberships/{membershipId}</text>
  <text class="field" x="110" y="845">id, name, surname, email</text>
  <text class="field" x="110" y="875">start_date, end_date</text>
  <text class="field" x="110" y="905">membership_years[]</text>
  <text class="field" x="110" y="935">renewals[]</text>
  <text class="field" x="110" y="965">purchases[]</text>
  <text class="field" x="110" y="995">attended_events[]</text>
  <text class="field" x="110" y="1025">wallet_pass_id, wallet_url</text>

  <rect class="box core" x="880" y="760" width="470" height="290"/>
  <text class="name" x="910" y="805">Purchase</text>
  <text class="path" x="910" y="835">purchases/{purchaseId}</text>
  <text class="field" x="910" y="875">id, payer_email</text>
  <text class="field" x="910" y="905">amount_total, currency</text>
  <text class="field" x="910" y="935">transaction_id, order_id</text>
  <text class="field" x="910" y="965">purchase_type, ref_id</text>
  <text class="field" x="910" y="995">payment_method, capture_status</text>

  <rect class="box core" x="1530" y="760" width="480" height="270"/>
  <text class="name" x="1560" y="805">EventPurchase</text>
  <text class="path" x="1560" y="835">specializzazione di Purchase</text>
  <text class="field" x="1560" y="875">id, event_id</text>
  <text class="field" x="1560" y="905">event_purchase_type</text>
  <text class="field" x="1560" y="935">participants_count</text>
  <text class="field" x="1560" y="965">membership_ids[]</text>

  <rect class="box core" x="1530" y="190" width="480" height="310"/>
  <text class="name" x="1560" y="235">EventOrder</text>
  <text class="path" x="1560" y="265">orders/{orderId}</text>
  <text class="field" x="1560" y="305">id, order_id, order_status</text>
  <text class="field" x="1560" y="335">event_id</text>
  <text class="field" x="1560" y="365">participants[]</text>
  <text class="field" x="1560" y="395">membership_targets[]</text>
  <text class="field" x="1560" y="425">membership_lookup</text>
  <text class="field" x="1560" y="455">purchase_id, captured</text>

  <rect class="box support" x="80" y="1160" width="430" height="190"/>
  <text class="name" x="110" y="1205">EntranceScan</text>
  <text class="path" x="110" y="1235">entrance_scans/{eventId}/scans/{membershipId}</text>
  <text class="field" x="110" y="1275">id, scanned_at, scan_token</text>
  <text class="field" x="110" y="1305">manual, operator</text>

  <rect class="box support" x="610" y="1160" width="380" height="190"/>
  <text class="name" x="640" y="1205">ScanToken</text>
  <text class="path" x="640" y="1235">scan_tokens/{token}</text>
  <text class="field" x="640" y="1275">id, event_id, created_by</text>
  <text class="field" x="640" y="1305">expires_at, is_active</text>

  <rect class="box support" x="1090" y="1160" width="360" height="190"/>
  <text class="name" x="1120" y="1205">Job</text>
  <text class="path" x="1120" y="1235">jobs/{jobId}</text>
  <text class="field" x="1120" y="1275">id, type, event_id, status</text>
  <text class="field" x="1120" y="1305">total, sent, failed</text>

  <rect class="box support" x="1550" y="1160" width="450" height="190"/>
  <text class="name" x="1580" y="1205">ContactMessage</text>
  <text class="path" x="1580" y="1235">contact_message/{messageId}</text>
  <text class="field" x="1580" y="1275">id, email, message, subject</text>
  <text class="field" x="1580" y="1305">participant_id, event_id</text>

  <path class="edge" d="M 510 330 C 650 330 730 330 880 330"/>
  <text class="edgeLabel" x="620" y="305">1 -> 0..*</text>

  <path class="edge" d="M 510 445 C 690 570 700 830 880 890"/>
  <text class="edgeLabel" x="610" y="635">event_id / ref_id</text>

  <path class="edge" d="M 580 900 C 700 870 760 445 880 405"/>
  <text class="edgeLabel" x="620" y="760">membership_id</text>

  <path class="edge" d="M 1350 910 C 1410 910 1460 900 1530 895"/>
  <text class="edgeLabel" x="1375" y="875">inherits</text>

  <path class="edge" d="M 1530 390 C 1460 430 1420 710 1350 870"/>
  <text class="edgeLabel" x="1380" y="635">purchase_id</text>

  <path class="edge" d="M 1530 330 C 1360 250 700 230 510 275"/>
  <text class="edgeLabel" x="1120" y="245">event_id</text>

  <path class="edge" d="M 295 490 C 295 650 295 1010 295 1160"/>
  <text class="edgeLabel" x="315" y="645">entrance scans</text>

  <path class="edge" d="M 580 990 C 540 1090 430 1120 330 1160"/>
  <text class="edgeLabel" x="400" y="1115">scan doc id</text>

  <path class="edge" d="M 510 390 C 670 530 690 1130 610 1230"/>
  <text class="edgeLabel" x="630" y="1100">scan_tokens.event_id</text>

  <path class="edge" d="M 510 415 C 800 600 1000 1000 1180 1160"/>
  <text class="edgeLabel" x="850" y="1120">jobs.event_id</text>

  <path class="edge" d="M 1380 455 C 1550 680 1730 940 1760 1160"/>
  <text class="edgeLabel" x="1660" y="1080">participant_id</text>

  <rect x="80" y="1370" width="28" height="28" fill="#18181b" stroke="#f97316" stroke-width="3"/>
  <text class="legend" x="125" y="1393">Core domain</text>
  <rect x="330" y="1370" width="28" height="28" fill="#18181b" stroke="#38bdf8" stroke-width="3"/>
  <text class="legend" x="375" y="1393">Support/operations</text>
</svg>
